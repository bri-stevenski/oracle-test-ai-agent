name: Refresh Security Ledger

on:
  push:
    branches:
      - main
    paths:
      - .harness/security/timeline.json

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate ledger
        run: python3 scripts/security_ledger.py

      - name: Commit if changed
        run: |
          if ! git diff --exit-code -- \
              .harness/security/timeline.json \
              docs/SECURITY_LEDGER.md; then
            git config user.name "github-actions[bot]"
            git config user.email \
              "github-actions[bot]@users.noreply.github.com"
            git add .harness/security/timeline.json \
                    docs/SECURITY_LEDGER.md
            git commit -m "chore: auto-refresh security ledger"
            git push
          fi
