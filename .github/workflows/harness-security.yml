name: Security Reviewer

on:
  pull_request:
    paths:
      - "agent/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes @harness-engineering/cli validate --severity error
      - run: npx --yes @harness-engineering/cli check-deps --severity error
      - run: npx --yes @harness-engineering/cli run-security-scan --severity error
