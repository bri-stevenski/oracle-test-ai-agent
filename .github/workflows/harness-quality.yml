name: Quality & Integrity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Unit Tests
        run: python3 -m unittest discover tests/unit
      
      - name: Harness Docs Coverage
        run: npx --yes @harness-engineering/cli check-docs --severity error
        continue-on-error: true # allow warnings for now as we transition
      
      - name: Harness Entropy Scan
        run: npx --yes @harness-engineering/cli detect-entropy --severity error
      
      - name: Harness Phase Gate
        run: npx --yes @harness-engineering/cli check-phase-gate --severity error
