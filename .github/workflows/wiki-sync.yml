name: Wiki Sync

on:
  push:
    branches:
      - main
    paths:
      - "docs/wiki/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push docs/wiki to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email \
            "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          git clone "$WIKI_URL" wiki-repo

          cp docs/wiki/*.md wiki-repo/

          cd wiki-repo
          git add .
          if git diff --cached --exit-code; then
            echo "No wiki changes to push."
          else
            git commit -m "docs: sync wiki from main (${SHA})"
            git push
          fi
